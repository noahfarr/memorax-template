# @package _global_
# https://github.com/vwxyzjn/cleanrl/blob/master/cleanrl/pqn.py

defaults:
  - /head@head: discrete_q_network

feature_extractor:
  _target_: memorax.networks.FeatureExtractor
  _convert_: object
  observation_extractor:
    _target_: flax.linen.Sequential
    layers:
      - _target_: flax.linen.Dense
        features: 120
        kernel_init:
          _target_: flax.linen.initializers.orthogonal
          scale: ${eval:'2**0.5'}
      - _target_: flax.linen.LayerNorm
      - _target_: flax.linen.relu
        _partial_: true
      - _target_: flax.linen.Dense
        features: 84
        kernel_init:
          _target_: flax.linen.initializers.orthogonal
          scale: ${eval:'2**0.5'}
      - _target_: flax.linen.LayerNorm
      - _target_: flax.linen.relu
        _partial_: true

optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 10.0
    - _target_: optax.radam
      learning_rate: 2.5e-4

epsilon_schedule:
  _target_: optax.linear_schedule
  init_value: 1.0
  end_value: 0.05
  transition_steps: ${eval:'0.5 * ${total_timesteps}'}

algorithm:
  _target_: memorax.algorithms.PQNConfig
  name: pqn
  num_envs: 4
  num_steps: 128
  td_lambda: 0.65
  num_minibatches: 4
  update_epochs: 4


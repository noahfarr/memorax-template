# @package _global_
# https://github.com/vwxyzjn/cleanrl/blob/master/cleanrl/ppo.py

defaults:
  - /head@actor_head: categorical
  - /head@critic_head: v_network

actor_head:
  kernel_init:
    _target_: flax.linen.initializers.orthogonal
    scale: 0.01

critic_head:
  kernel_init:
    _target_: flax.linen.initializers.orthogonal
    scale: 1.0

feature_extractor:
  _target_: memorax.networks.FeatureExtractor
  _convert_: object
  observation_extractor:
    _target_: flax.linen.Sequential
    layers:
      - _target_: flax.linen.Dense
        features: 64
        kernel_init:
          _target_: flax.linen.initializers.orthogonal
          scale: ${eval:'2**0.5'}
      - _target_: flax.linen.tanh
        _partial_: true
      - _target_: flax.linen.Dense
        features: 64
        kernel_init:
          _target_: flax.linen.initializers.orthogonal
          scale: ${eval:'2**0.5'}
      - _target_: flax.linen.tanh
        _partial_: true

optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.adam
      learning_rate: 2.5e-4

algorithm:
  _target_: memorax.algorithms.MAPPOConfig
  name: mappo
  num_envs: 4
  num_steps: 128
  gae_lambda: 0.95
  num_minibatches: 4
  update_epochs: 4
  normalize_advantage: True
  clip_coefficient: 0.2
  clip_value_loss: True
  entropy_coefficient: 0.01

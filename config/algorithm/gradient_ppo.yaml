# @package _global_

defaults:
  - /torso: mlp

algorithm:
  _target_: memorax.algorithms.GradientPPOConfig
  name: gradient_ppo
  num_envs: 32
  num_steps: 128
  gae_lambda: 0.95
  num_minibatches: 4
  update_epochs: 4
  normalize_advantage: True
  clip_coefficient: 0.2
  clip_value_loss: True
  entropy_coefficient: 0.01
  regularization_coefficient: 0.01
  truncation_length: 16

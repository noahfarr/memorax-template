# @package _global_

defaults:
  - /torso: mlp
  - /stack: llama

head:
  _target_: memorax.networks.heads.DiscreteQNetwork
  action_dim: ${get_action_dim:${environment}}

feature_extractor:
  _target_: memorax.networks.FeatureExtractor
  _convert_: object
  observation_extractor:
    _target_: flax.linen.Sequential
    layers:
      - _target_: flax.linen.Dense
        features: 256
      - _target_: flax.linen.relu
        _partial_: true

optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 1.0
    - _target_: optax.adam
      learning_rate: 2.5e-4

epsilon_schedule:
  _target_: optax.linear_schedule
  init_value: 1.0
  end_value: 0.05
  transition_steps: ${eval:'int(0.5 * ${total_timesteps})'}

sequence_length: 128

buffer:
  _target_: flashbax.make_trajectory_buffer
  add_batch_size: ${algorithm.num_envs}
  sample_batch_size: 128
  sample_sequence_length: ${sequence_length}
  period: 1
  min_length_time_axis: ${sequence_length}
  max_length_time_axis: 10_000

algorithm:
  _target_: memorax.algorithms.DQNConfig
  name: dqn
  num_envs: 1
  tau: 1.0
  target_update_frequency: 500
  train_frequency: 4
  burn_in_length: 0

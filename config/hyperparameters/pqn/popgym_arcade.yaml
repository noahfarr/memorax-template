# @package _global_
# Matches official POPGym Arcade PQN_RNN hyperparameters
# (bolt-research/popgym-arcade, arXiv:2503.01450)

total_timesteps: 20_000_000
num_epochs: 10
num_eval_steps: 50_000

optimizer:
  _target_: optax.chain
  _args_:
    - _target_: optax.clip_by_global_norm
      max_norm: 0.5
    - _target_: optax.radam
      learning_rate:
        _target_: optax.linear_schedule
        init_value: 5e-5
        end_value: 5e-7
        transition_steps: ${eval:'(${total_timesteps} // ${algorithm.num_steps} // ${algorithm.num_envs}) * ${algorithm.num_minibatches} * ${algorithm.update_epochs}'}

epsilon_schedule:
  transition_steps: ${eval:'int(0.25 * (2_000_000 // ${algorithm.num_steps} // ${algorithm.num_envs}) * ${algorithm.num_minibatches} * ${algorithm.num_steps} * ${algorithm.num_envs})'}

algorithm:
  num_envs: 128
  num_steps: 128
  num_minibatches: 16
  update_epochs: 4
  td_lambda: 0.95
